<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiscalFlow</title>
  <style>
    :root{--bg:#07111f;--card:#0f1f34;--border:rgba(148,191,255,.14);--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:24px;color:var(--text);background:var(--bg);font-family:Arial,sans-serif}header{margin-bottom:24px}h1{margin:0 0 6px}p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:16px;margin-bottom:20px}.card{padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--card)}.label{display:block;margin-bottom:10px;color:var(--muted);font-size:13px}.value{font-size:24px}.table-card{overflow-x:auto}table{width:100%;min-width:820px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left;font-size:13px}th{color:var(--muted)}.status{padding:5px 8px;border-radius:999px;color:#bbf7d0;background:rgba(34,197,94,.15)}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:500px){body{padding:16px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><h1>FiscalFlow</h1><p>Visão geral das notas fiscais processadas.</p></header>
  <section class="grid">
    <article class="card"><span class="label">Notas</span><strong class="value" id="totalNotas">0</strong></article>
    <article class="card"><span class="label">Valor total</span><strong class="value" id="valorTotal">R$ 0,00</strong></article>
    <article class="card"><span class="label">Fornecedores</span><strong class="value" id="totalFornecedores">0</strong></article>
    <article class="card"><span class="label">Filiais</span><strong class="value" id="totalFiliais">0</strong></article>
  </section>
  <section class="card table-card">
    <table><thead><tr><th>Fornecedor</th><th>NF</th><th>Filial</th><th>Emissão</th><th>Vencimento</th><th>Valor</th><th>Status</th></tr></thead><tbody id="tabela"></tbody></table>
  </section>
  <script>
    const moeda=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
    const numero=(valor)=>Number(String(valor||'0').replace(/[^0-9,.-]/g,'').replace('.','').replace(',','.'))||0;
    function renderizar(dados){
      document.getElementById('totalNotas').textContent=dados.length;
      document.getElementById('valorTotal').textContent=moeda.format(dados.reduce((s,i)=>s+numero(i.VALOR),0));
      document.getElementById('totalFornecedores').textContent=new Set(dados.map(i=>i.FORNECEDOR).filter(Boolean)).size;
      document.getElementById('totalFiliais').textContent=new Set(dados.map(i=>i.FILIAL).filter(Boolean)).size;
      document.getElementById('tabela').innerHTML=dados.slice().reverse().slice(0,20).map(i=>`<tr><td>${i.FORNECEDOR||''}</td><td>${i.NF||''}</td><td>${i.FILIAL||''}</td><td>${i['EMISSÃO']||''}</td><td>${i.VENCIMENTO||''}</td><td>${i.VALOR||''}</td><td><span class="status">${i.STATUS||''}</span></td></tr>`).join('');
    }
    google.script.run.withSuccessHandler(renderizar).obterDadosDashboard();
  </script>
</body>
</html>
