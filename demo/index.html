<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiscalFlow Demo</title>
  <style>
    :root{--bg:#07111f;--card:#0f1f34;--border:rgba(148,191,255,.14);--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:24px;color:var(--text);background:radial-gradient(circle at top right,rgba(59,130,246,.17),transparent 35%),var(--bg);font-family:Arial,sans-serif}header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}h1{margin:0 0 6px}p{margin:0;color:var(--muted)}button,input,select{font:inherit}.button,.control{padding:11px 13px;border-radius:10px}.button{border:0;color:#fff;background:var(--blue);cursor:pointer}.control{width:100%;border:1px solid var(--border);color:var(--text);background:var(--card)}.filters{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:16px;margin-bottom:18px}.card{padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--card)}.label{display:block;margin-bottom:10px;color:var(--muted);font-size:13px}.value{font-size:24px}.table-card{overflow-x:auto}table{width:100%;min-width:780px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left;font-size:13px}th{color:var(--muted)}.status{padding:5px 8px;border-radius:999px;background:rgba(34,197,94,.15)}@media(max-width:800px){.filters,.grid{grid-template-columns:1fr 1fr}}@media(max-width:520px){body{padding:16px}header{align-items:flex-start;flex-direction:column}.filters,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div><h1>FiscalFlow</h1><p>Demonstração com dados fictícios.</p></div><button class="button" id="processar">Processar e-mails</button></header>
  <section class="filters"><input class="control" id="pesquisa" placeholder="Pesquisar fornecedor ou NF"><select class="control" id="filial"><option value="">Todas as filiais</option><option>BK</option><option>CLIA</option><option>MATRIZ</option><option>IPA</option></select><select class="control" id="status"><option value="">Todos os status</option><option>Processada</option><option>Vencendo</option><option>Atrasada</option></select></section>
  <section class="grid"><article class="card"><span class="label">Notas</span><strong class="value" id="totalNotas"></strong></article><article class="card"><span class="label">Valor total</span><strong class="value" id="valorTotal"></strong></article><article class="card"><span class="label">Vencendo</span><strong class="value" id="totalVencendo"></strong></article><article class="card"><span class="label">Filiais</span><strong class="value" id="totalFiliais"></strong></article></section>
  <section class="card table-card"><table><thead><tr><th>Fornecedor</th><th>NF</th><th>Filial</th><th>Emissão</th><th>Vencimento</th><th>Valor</th><th>Status</th></tr></thead><tbody id="tabela"></tbody></table></section>
  <script>
    const notas=[{fornecedor:'Alfa Equipamentos',nf:'45821',filial:'BK',emissao:'15/07/2026',vencimento:'25/07/2026',valor:18450.9,status:'Processada'},{fornecedor:'Porto Service',nf:'9527',filial:'CLIA',emissao:'14/07/2026',vencimento:'20/07/2026',valor:8940,status:'Vencendo'},{fornecedor:'Tech Parts Brasil',nf:'78954',filial:'MATRIZ',emissao:'12/07/2026',vencimento:'11/08/2026',valor:32780.45,status:'Processada'},{fornecedor:'Logística Litoral',nf:'1845',filial:'IPA',emissao:'10/07/2026',vencimento:'16/07/2026',valor:12650,status:'Atrasada'}];
    const moeda=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});const pesquisa=document.getElementById('pesquisa');const filial=document.getElementById('filial');const status=document.getElementById('status');
    function renderizar(){const termo=pesquisa.value.toLowerCase();const dados=notas.filter(n=>(!termo||n.fornecedor.toLowerCase().includes(termo)||n.nf.includes(termo))&&(!filial.value||n.filial===filial.value)&&(!status.value||n.status===status.value));document.getElementById('totalNotas').textContent=dados.length;document.getElementById('valorTotal').textContent=moeda.format(dados.reduce((s,n)=>s+n.valor,0));document.getElementById('totalVencendo').textContent=dados.filter(n=>n.status==='Vencendo').length;document.getElementById('totalFiliais').textContent=new Set(dados.map(n=>n.filial)).size;document.getElementById('tabela').innerHTML=dados.map(n=>`<tr><td>${n.fornecedor}</td><td>${n.nf}</td><td>${n.filial}</td><td>${n.emissao}</td><td>${n.vencimento}</td><td>${moeda.format(n.valor)}</td><td><span class="status">${n.status}</span></td></tr>`).join('')}
    [pesquisa,filial,status].forEach(e=>{e.addEventListener('input',renderizar);e.addEventListener('change',renderizar)});document.getElementById('processar').addEventListener('click',()=>alert('Processamento simulado com sucesso.'));renderizar();
  </script>
</body>
</html>
